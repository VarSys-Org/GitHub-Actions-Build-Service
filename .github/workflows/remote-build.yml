name: Remote Build Service

on:
  repository_dispatch:
    types: [remote-build]
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Source code archive URL (skip to build from checkout)'
        required: false
      build_id:
        description: 'Unique build identifier'
        required: false
      callback_url:
        description: 'Optional webhook URL to notify when build completes'
        required: false
      project_type:
        description: 'Project type: auto (default), flutter, expo, capacitor'
        required: false
        default: 'auto'
      variant:
        description: 'Build variant: debug (default) or release'
        required: false
        default: 'debug'
      repo:
        description: 'Repo to build (e.g. VarSys-Org/Joint-Journey-web)'
        required: false
      flutter_version:
        description: 'Flutter version (e.g. 3.24.0). Leave empty for stable channel.'
        required: false

jobs:
  remote-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter (if Flutter project)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.flutter_version || github.event.client_payload.flutter_version || '' }}
          channel: 'stable'
          cache: true
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.project_type == 'flutter') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.project_type == '') ||
          (github.event_name == 'repository_dispatch' && github.event.client_payload.project_type == 'flutter') ||
          (github.event_name == 'repository_dispatch' && github.event.client_payload.project_type == '') ||
          (github.event_name == 'repository_dispatch' && github.event.client_payload.project_type == null) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.project_type == 'auto') ||
          (github.event_name == 'repository_dispatch' && github.event.client_payload.project_type == 'auto')

      - name: Extract build info
        id: build_info
        run: |
          # Handle both workflow_dispatch and repository_dispatch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SOURCE_URL="${{ github.event.inputs.source_url }}"
            BUILD_ID="${{ github.event.inputs.build_id }}"
            CALLBACK_URL="${{ github.event.inputs.callback_url }}"
            VARIANT="${{ github.event.inputs.variant }}"
            PROJECT_TYPE="${{ github.event.inputs.project_type }}"
            REPO="${{ github.event.inputs.repo }}"
          else
            SOURCE_URL="${{ github.event.client_payload.source_url }}"
            BUILD_ID="${{ github.event.client_payload.build_id }}"
            CALLBACK_URL="${{ github.event.client_payload.callback_url }}"
            VARIANT="${{ github.event.client_payload.variant }}"
            PROJECT_TYPE="${{ github.event.client_payload.project_type }}"
          fi
          
          # Default to release if no variant specified
          VARIANT="${VARIANT:-release}"
          PROJECT_TYPE="${PROJECT_TYPE:-auto}"
          
          echo "SOURCE_URL=$SOURCE_URL" >> $GITHUB_OUTPUT
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "CALLBACK_URL=$CALLBACK_URL" >> $GITHUB_OUTPUT
          echo "VARIANT=$VARIANT" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$(date +%s)" >> $GITHUB_OUTPUT
          echo "PROJECT_TYPE=$PROJECT_TYPE" >> $GITHUB_OUTPUT
          echo "REPO=$REPO" >> $GITHUB_OUTPUT

      - name: Checkout source repo (if no source_url)
        uses: actions/checkout@v4
        if: steps.build_info.outputs.SOURCE_URL == '' && steps.build_info.outputs.REPO != ''
        with:
          repository: ${{ steps.build_info.outputs.REPO }}
          path: project
          ref: main

      - name: Download source code (from Appwrite)
        if: steps.build_info.outputs.SOURCE_URL != ''
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          SOURCE_URL="${{ steps.build_info.outputs.SOURCE_URL }}"
          echo "Downloading source from: $SOURCE_URL"
          curl -L -o source.tar.gz \
            -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "X-Appwrite-Key: $APPWRITE_API_KEY" \
            "$SOURCE_URL"
          mkdir -p project
          tar -xzf source.tar.gz -C project
          ls -la project/

      - name: Cache dependencies
        uses: actions/cache@v4
        if: steps.build_info.outputs.PROJECT_TYPE != 'flutter'
        with:
          path: |
            project/node_modules
            ~/.npm
            ~/.local/share/pnpm/store
          key: ${{ runner.os }}-deps-${{ hashFiles('project/package-lock.json', 'project/pnpm-lock.yaml', 'project/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/sdk
            ~/.android/avd
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('project/android/build.gradle', 'project/android/app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Install dependencies
        working-directory: project
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "Flutter project — running flutter pub get"
            flutter pub get
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "pnpm project detected"
            corepack enable
            pnpm install --ignore-scripts
          elif [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Create .env file (if secrets provided)
        working-directory: project
        run: |
          if [ -n "${{ secrets.APPWRITE_ENDPOINT }}" ]; then
            cat > .env << EOF
          APPWRITE_ENDPOINT=${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID=${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_DATABASE_ID=${{ secrets.APPWRITE_DATABASE_ID }}
          APPWRITE_COLLECTION_ID=${{ secrets.APPWRITE_COLLECTION_ID }}
          APPWRITE_BUCKET_ID=${{ secrets.APPWRITE_BUCKET_ID }}
          EOF
          fi

      - name: Prepare Android project (Expo or Capacitor)
        working-directory: project
        if: "!contains(fromJson('[\"flutter\"]'), steps.build_info.outputs.PROJECT_TYPE) && !( steps.build_info.outputs.PROJECT_TYPE == 'auto' && hashFiles('project/pubspec.yaml') != '' )"
        run: |
          echo "Detecting project type..."

          if [ -f "capacitor.config.ts" ] || [ -f "capacitor.config.js" ] || [ -f "capacitor.config.json" ]; then
            echo "Capacitor project detected"
            if grep -q '"cap:build"' package.json; then
              if [ -f "pnpm-lock.yaml" ]; then
                corepack enable && pnpm cap:build
              else
                npm run cap:build
              fi
            else
              npm run build
              npx cap sync android
            fi
          elif [ -f "app.json" ] || [ -f "app.config.js" ] || [ -f "app.config.ts" ]; then
            echo "Expo project detected"
            npx expo prebuild --platform android --clean
          elif [ -d "android" ]; then
            echo "Using existing android directory"
          else
            echo "No supported mobile project structure found"
            exit 1
          fi

          if [ ! -d "android" ]; then
            echo "android directory was not generated"
            exit 1
          fi

          # Fix gradlew permissions
          chmod +x android/gradlew 2>/dev/null || true

      - name: Build Flutter APK
        working-directory: project
        if: steps.build_info.outputs.PROJECT_TYPE == 'flutter' || ( steps.build_info.outputs.PROJECT_TYPE == 'auto' && hashFiles('project/pubspec.yaml') != '' )
        run: |
          VARIANT="${{ steps.build_info.outputs.VARIANT }}"
          if [ "$VARIANT" = "release" ]; then
            flutter build apk --release --no-pub
            flutter build appbundle --release --no-pub
          else
            flutter build apk --debug --no-pub
          fi
          echo "Flutter build complete"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            project/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('project/android/gradle/wrapper/gradle-wrapper.properties', 'project/android/build.gradle', 'project/android/app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Verify JVM Memory Settings (Fast Check)
        working-directory: project/android
        if: steps.build_info.outputs.PROJECT_TYPE != 'flutter'
        env:
          GRADLE_OPTS: -Xmx7g -XX:MaxMetaspaceSize=3g -XX:+HeapDumpOnOutOfMemoryError
          JAVA_TOOL_OPTIONS: -Xmx7g -XX:MaxMetaspaceSize=3g
        run: |
          echo "========================================="
          echo "JVM MEMORY CONFIGURATION VERIFICATION"
          echo "========================================="
          echo "GRADLE_OPTS: $GRADLE_OPTS"
          echo "JAVA_TOOL_OPTIONS: $JAVA_TOOL_OPTIONS"
          echo ""
          echo "Running Gradle with memory diagnostics..."
          ./gradlew --version --no-daemon | head -20
          echo ""
          echo "Testing KSP compilation environment..."
          ./gradlew tasks --no-daemon | grep -i ksp || echo "KSP tasks available"
          echo ""
          echo "✅ Memory settings verified! Heap: 7GB (MAX), Metaspace: 3GB (MAX)"
          echo "⚡ Future-proofed for projects with 100+ dependencies"
          echo "========================================="

      - name: Build Android APK
        working-directory: project/android
        if: steps.build_info.outputs.PROJECT_TYPE != 'flutter'
        env:
          GRADLE_OPTS: -Xmx4g
        run: |
          chmod +x gradlew
          VARIANT="${{ steps.build_info.outputs.VARIANT }}"
          VARIANT_CAPITALIZED="$(echo ${VARIANT^})"
          echo "Building variant: $VARIANT"
          ./gradlew assemble${VARIANT_CAPITALIZED} --no-daemon

      - name: Build Android AAB
        working-directory: project/android
        if: steps.build_info.outputs.PROJECT_TYPE != 'flutter'
        env:
          GRADLE_OPTS: -Xmx4g
        run: |
          chmod +x gradlew
          VARIANT="${{ steps.build_info.outputs.VARIANT }}"
          VARIANT_CAPITALIZED="$(echo ${VARIANT^})"
          ./gradlew bundle${VARIANT_CAPITALIZED} --no-daemon

      - name: Rename artifacts
        run: |
          BUILD_ID="${{ steps.build_info.outputs.BUILD_ID }}"
          BUILD_NUM="${{ steps.build_info.outputs.BUILD_NUMBER }}"
          VARIANT="${{ steps.build_info.outputs.VARIANT }}"
          PROJECT_TYPE="${{ steps.build_info.outputs.PROJECT_TYPE }}"
          
          if [ "$PROJECT_TYPE" = "flutter" ]; then
            # Flutter output paths
            APK_PATH=$(find project/build/app/outputs/apk -name "*.apk" 2>/dev/null | head -n 1)
            AAB_PATH=$(find project/build/app/outputs/bundle -name "*.aab" 2>/dev/null | head -n 1)
          else
            # Expo/Capacitor/RN output paths
            APK_PATH=$(find project/android/app/build/outputs/apk/$VARIANT -name "*.apk" | head -n 1)
            AAB_PATH=$(find project/android/app/build/outputs/bundle/${VARIANT} -name "*.aab" | head -n 1)
          fi

          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "build-${BUILD_ID}-${BUILD_NUM}-${VARIANT}.apk"
            echo "Found APK: $APK_PATH"
          fi

          if [ -n "$AAB_PATH" ]; then
            cp "$AAB_PATH" "build-${BUILD_ID}-${BUILD_NUM}-${VARIANT}.aab"
            echo "Found AAB: $AAB_PATH"
          fi

          if [ -z "$APK_PATH" ] && [ -z "$AAB_PATH" ]; then
            echo "No APK or AAB artifacts were found"
            exit 1
          fi

      - name: Upload to Appwrite Storage
        id: upload
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_BUCKET_ID: ${{ secrets.APPWRITE_BUCKET_ID }}
          BUILD_ID: ${{ steps.build_info.outputs.BUILD_ID }}
          BUILD_NUM: ${{ steps.build_info.outputs.BUILD_NUMBER }}
        run: |
          npm install node-appwrite
          node -e "
          const { Client, Storage, ID } = require('node-appwrite');
          const { InputFile } = require('node-appwrite/file');
          const fs = require('fs');

          const client = new Client()
            .setEndpoint(process.env.APPWRITE_ENDPOINT)
            .setProject(process.env.APPWRITE_PROJECT_ID)
            .setKey(process.env.APPWRITE_API_KEY);

          const storage = new Storage(client);

          async function upload() {
            const apkFile = fs.readdirSync('.').find(f => f.endsWith('.apk'));
            const aabFile = fs.readdirSync('.').find(f => f.endsWith('.aab'));

            if (!apkFile && !aabFile) {
              throw new Error('No APK or AAB files found for upload');
            }

            let apkResult = null;
            let aabResult = null;

            if (apkFile) {
              apkResult = await storage.createFile(
                process.env.APPWRITE_BUCKET_ID,
                ID.unique(),
                InputFile.fromPath(apkFile, apkFile)
              );
            }

            if (aabFile) {
              aabResult = await storage.createFile(
                process.env.APPWRITE_BUCKET_ID,
                ID.unique(),
                InputFile.fromPath(aabFile, aabFile)
              );
            }

            console.log('APK_FILE_ID=' + (apkResult ? apkResult.\$id : ''));
            console.log('AAB_FILE_ID=' + (aabResult ? aabResult.\$id : ''));
          }

          upload().catch(console.error);
          " | tee -a $GITHUB_OUTPUT

      - name: Send callback notification
        if: steps.build_info.outputs.CALLBACK_URL != ''
        run: |
          curl -X POST "${{ steps.build_info.outputs.CALLBACK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "build_id": "${{ steps.build_info.outputs.BUILD_ID }}",
              "status": "success",
              "apk_file_id": "${{ steps.upload.outputs.APK_FILE_ID }}",
              "aab_file_id": "${{ steps.upload.outputs.AAB_FILE_ID }}",
              "apk_url": "${{ steps.upload.outputs.APK_URL }}",
              "build_number": "${{ steps.build_info.outputs.BUILD_NUMBER }}"
            }'

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: remote-build-${{ steps.build_info.outputs.BUILD_ID }}
          path: |
            *.apk
            *.aab
          retention-days: 7
